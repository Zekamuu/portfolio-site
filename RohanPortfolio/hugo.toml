baseURL = 'https://Zekamuu.github.io/'
languageCode = 'en-us'
title = "Rohan's Engineering Portfolio"
theme = "hugo-profile"

# -----------------------------------------------------------------------------
# MENU CONFIGURATION (Top Navigation)
# -----------------------------------------------------------------------------
[menu]
  [[menu.main]]
    name = "About"
    url = "/#about"
    weight = 1

  [[menu.main]]
    name = "Skills"
    url = "/#skills"
    weight = 2

  [[menu.main]]
    name = "Experience"
    url = "/#experience"
    weight = 3

  [[menu.main]]
    name = "Projects"
    url = "/#projects"
    weight = 4

  [[menu.main]]
    name = "Education"
    url = "/#education"
    weight = 5

  [[menu.main]]
    name = "Contact"
    url = "/#contact"
    weight = 6

# -----------------------------------------------------------------------------
# PARAMETERS (Content Sections)
# -----------------------------------------------------------------------------
[params]
  # Theme color: "default", "blue", "green", "purple", "red"
  themeStyle = "default" 
  favicon = "/images/favicon.ico"

  # Navbar configuration
  [params.navbar]
    [params.navbar.menus]
      disableAbout = true
      disableExperience = true
      disableEducation = true
      disableProjects = true
      disableContact = true

  # --- HERO SECTION (Top of page) ---
  [params.hero]
    enable = true
    intro = "Hi! My name is"
    title = "Rohan Nagashetti"
    subtitle = "and this is my Engineering Portfolio"
    image = "/images/hero.jpeg"  # Add your photo to static/images/
    
    # Social links in the Hero section
    [params.hero.socialLinks]
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-github"
        url = "https://github.com/Zekamuu"
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-linkedin"
        url = "https://linkedin.com/in/yourusername"
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-twitter"
        url = "https://twitter.com/yourusername"

# --- ABOUT SECTION (CORRECTED) ---
  [params.about]
    enable = true
    title = "About Me"
    content = """
I am a highly curious engineering student with interests in robotics, IoT systems, algorithmic trading, machine learning, quantum computing and much more. My journey in technology began in robotics with a fascination for how hardware and software can work together to tackle real-world problems.

Currently pursuing my degree in Computer Engineering, I have gained hands-on experience through various projects involving embedded systems, cloud computing, and data analysis.

When I'm not coding or tinkering with electronics, you can find me watching YouTube videos about emerging technologies, burying myself in tech books to teach myself new concepts (such as hugo for this website!), or connecting with others over fascinating engineering topics.
"""
    [params.about.skills]
      enable = true
      title = "Here are a few technologies I've been working with recently:"
      items = ["Python", "Java", "ESP32", "Arduino", "C++", "JavaScript", "Hugo", "Git", "Google Earth Engine", "PineScript"]
    
    


  # --- EXPERIENCE SECTION ---
  [params.experience]
    enable = true
    title = "Experience"
    
    [[params.experience.items]]
      company = "Personal Projects"
      [[params.experience.items.jobs]]
        name = "IoT Project Developer"
        date = "2023 - Present"
        content = "Developed multiple IoT projects including weather stations and smart home devices using ESP32 microcontrollers, Arduino Cloud, and various sensors. Implemented real-time data monitoring and cloud connectivity."
      
    [[params.experience.items]]
      company = "Tech Startup"
      [[params.experience.items.jobs]]
        name = "Software Engineering Intern"
        date = "Summer 2024"
        content = "Worked on full-stack web development using React, Node.js, and MongoDB. Contributed to the development of a customer management system and improved application performance by 30%."
      
    [[params.experience.items]]
      company = "Robotics Team Captain"
      [[params.experience.items.jobs]]
        name = "Robotics Team Member"
        date = "2022 - 2024"
        content = "Collaborated on autonomous robot development using ROS, Python, and C++. Participated in national robotics competitions and mentored junior members."

  # --- EDUCATION SECTION ---
  [params.education]
    enable = true
    title = "Education"
    
    [[params.education.items]]
      title = "Bachelor of Science in Engineering"
      [params.education.items.school]
        name = "Your University Name"
        url = "https://example.com"
      date = "2021 - 2025"
      GPA = "3.8/4.0"
      content = "Specializing in Electrical and Computer Engineering. Relevant coursework includes Embedded Systems, Data Structures, Algorithms, and Machine Learning."
      [params.education.items.featuredLink]
        enable = true
        name = "View Detailed Coursework"
        url = "/education-details/"
      
    [[params.education.items]]
      title = "High School"
      [params.education.items.school]
        name = "Redwood High School"
        url = "https://redwood.tamdistrict.org/"
      date = "2022 - 2026"
      GPA = "4.5/4.0"
      [params.education.items.featuredLink]
        enable = true
        name = "View Detailed Coursework"
        url = "/highschool-details/"

  # --- PROJECTS SECTION ---
  [params.projects]
    enable = true
    title = "Projects"
    subtitle = "Here are some of my recent works"
    numberOfProjectsToShow = 6 
    # Note: The actual project cards are pulled from your "content/projects/*.md" files.

  # --- CONTACT SECTION ---
  [params.contact]
    enable = true
    title = "Get in Touch"
    subtitle = "Have a question or want to work together?"
    email = "youremail@example.com"
    # Optional: Formspree ID for working contact form
    formspreeId = "your-formspree-id"
