baseURL = 'https://Zekamuu.github.io/'
languageCode = 'en-us'
title = "Rohan's Engineering Portfolio"
theme = "hugo-profile"

# -----------------------------------------------------------------------------
# MENU CONFIGURATION (Top Navigation)
# -----------------------------------------------------------------------------
[menu]
  [[menu.main]]
    name = "About"
    url = "/#about"
    weight = 1

  [[menu.main]]
    name = "Skills"
    url = "/#skills"
    weight = 2

  [[menu.main]]
    name = "Experience"
    url = "/#experience"
    weight = 3

  [[menu.main]]
    name = "Projects"
    url = "/#projects"
    weight = 4

  [[menu.main]]
    name = "Education"
    url = "/#education"
    weight = 5

  [[menu.main]]
    name = "Contact"
    url = "/#contact"
    weight = 6

# -----------------------------------------------------------------------------
# PARAMETERS (Content Sections)
# -----------------------------------------------------------------------------
[params]
  # Theme color: "default", "blue", "green", "purple", "red"
  themeStyle = "default" 
  favicon = "/images/favicon.ico"

  # Navbar configuration
  [params.navbar]
    [params.navbar.menus]
      disableAbout = true
      disableExperience = true
      disableEducation = true
      disableProjects = true
      disableContact = true

  # --- HERO SECTION (Top of page) ---
  [params.hero]
    enable = true
    intro = "Hi! My name is"
    title = "Rohan Nagashetti"
    subtitle = "and this is my Engineering Portfolio"
    image = "/images/hero.jpeg"  # Add your photo to static/images/
    
    # Social links in the Hero section
    [params.hero.socialLinks]
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-github"
        url = "https://github.com/Zekamuu"
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-linkedin"
        url = "https://www.linkedin.com/in/rohan-nagashetti-632b16324/"
      [[params.hero.socialLinks.fontAwesomeIcons]]
        icon = "fab fa-twitter"
        url = "https://twitter.com/yourusername"

# --- ABOUT SECTION (CORRECTED) ---
  [params.about]
    enable = true
    title = "About Me"
    content = """
I am a highly curious engineering student with interests in robotics, IoT systems, algorithmic trading, machine learning, quantum computing and much more. My journey in technology began in FIRST Robotics  with a fascination for how hardware and software can work together to tackle real-world challenges.

Currently pursuing my degree in Electrical and Computer Engineering, I have gained hands-on experience through various projects involving embedded systems, cloud computing, and data analysis.

When I'm not coding or tinkering with electronics, you can find me watching YouTube videos about emerging technologies, burying myself in tech books to teach myself new concepts (such as hugo for this website!), or connecting with others over fascinating engineering topics.
"""
    [params.about.skills]
      enable = true
      title = "Here are a few technologies I've been working with recently:"
      items = ["Python", "Java", "ESP32", "Arduino", "C++", "JavaScript", "Hugo", "Git", "Google Earth Engine", "PineScript", "PyTorch", "RoadRunner", "Pedro Pathing", "OnBotJava"]
    
    


  # --- EXPERIENCE SECTION ---
  [params.experience]
    enable = true
    title = "Experience"

    [[params.experience.items]]
      company = "FTC Robotics: Maringineers 21366"
      [[params.experience.items.jobs]]
        name = "Robotics Team Captain"
        date = "2023 - 2026"
        content = """
Captain (elected) of 15+ members team (doubled membership)\n
Worked on both mechanical and software modules\n
Introduced Pedro Pathing software\n
Lead by example and fostering teamwork\n
Built culture of collaboration, resilience, and mutual inspiration\n
Won 2 Innovate Awards & Design Award runner-up\n
Ranked #3 in the competitive Bay Area tournament\n
"""
    
    [[params.experience.items]]
      company = "Saroja Sustainable Solutions"
      [[params.experience.items.jobs]]
        name = "R&D Intern"
        date = "2024 - 2026"
        content = """
-Developed GIS projects\n
-Mapped stubble fire using S-NPP satellite data\n
-Mapped pollution data using Copernicus satellite data\n
-Time series and spatial analysis(kriging)\n
-Collaborated across time-zones\n
-Learned open-source principles\n
-Helped identify pollution sources and patterns\n
-Developed open-source repository for digital public goods"""
      

      
    

  # --- EDUCATION SECTION ---
  [params.education]
    enable = true
    title = "Education"
    
    [[params.education.items]]
      title = "Bachelor of Science in Engineering"
      [params.education.items.school]
        name = "Your University Name"
        url = "https://example.com"
      date = "2021 - 2025"
      GPA = "3.8/4.0"
      content = "Specializing in Electrical and Computer Engineering. Relevant coursework includes Embedded Systems, Data Structures, Algorithms, and Machine Learning."
      [params.education.items.featuredLink]
        enable = true
        name = "View Detailed Coursework"
        url = "/education-details/"
      
    [[params.education.items]]
      title = "High School"
      [params.education.items.school]
        name = "Redwood High School"
        url = "https://redwood.tamdistrict.org/"
      date = "2022 - 2026"
      GPA = "4.5/4.0"
      [params.education.items.featuredLink]
        enable = true
        name = "View Detailed Coursework"
        url = "/highschool-details/"

  # --- PROJECTS SECTION ---
  [params.projects]
    enable = true
    title = "Projects"
    subtitle = "Here are some of my recent works"
    numberOfProjectsToShow = 6 
    # Note: The actual project cards are pulled from your "content/projects/*.md" files.

  # --- CONTACT SECTION ---
  [params.contact]
    enable = true
    title = "Get in Touch"
    subtitle = "Have a question or want to work together?"
    email = "youremail@example.com"
    # Optional: Formspree ID for working contact form
    formspreeId = "your-formspree-id"
